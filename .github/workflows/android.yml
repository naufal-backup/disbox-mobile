name: Android CI/CD

on:
  push:
    branches: [ "master", "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install dependencies
      run: npm install

    - name: Build Web Application
      run: npm run build

    - name: Setup Capacitor Android
      run: |
        npx cap add android || true
        npx cap sync android

    - name: Restore Disbox Brand Icons (cap sync overwrites them)
      run: |
        sudo apt-get update && sudo apt-get install -y imagemagick
        SOURCE="assets/icon.png"
        RES="android/app/src/main/res"
        # GitHub Actions uses ImageMagick 6 (convert), not IM7 (magick)
        resize() { convert "$SOURCE" -resize "$1" "$2"; }
        resize "48x48"   "$RES/mipmap-mdpi/ic_launcher.png"
        resize "48x48"   "$RES/mipmap-mdpi/ic_launcher_round.png"
        resize "48x48"   "$RES/mipmap-mdpi/ic_launcher_foreground.png"
        resize "72x72"   "$RES/mipmap-hdpi/ic_launcher.png"
        resize "72x72"   "$RES/mipmap-hdpi/ic_launcher_round.png"
        resize "72x72"   "$RES/mipmap-hdpi/ic_launcher_foreground.png"
        resize "96x96"   "$RES/mipmap-xhdpi/ic_launcher.png"
        resize "96x96"   "$RES/mipmap-xhdpi/ic_launcher_round.png"
        resize "96x96"   "$RES/mipmap-xhdpi/ic_launcher_foreground.png"
        resize "144x144" "$RES/mipmap-xxhdpi/ic_launcher.png"
        resize "144x144" "$RES/mipmap-xxhdpi/ic_launcher_round.png"
        resize "144x144" "$RES/mipmap-xxhdpi/ic_launcher_foreground.png"
        resize "192x192" "$RES/mipmap-xxxhdpi/ic_launcher.png"
        resize "192x192" "$RES/mipmap-xxxhdpi/ic_launcher_round.png"
        resize "192x192" "$RES/mipmap-xxxhdpi/ic_launcher_foreground.png"
        echo "Icons restored!"

    - name: Generate Release Keystore
      run: |
        keytool -genkey -v \
          -keystore disbox-release.keystore \
          -alias disbox \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass disbox123 \
          -keypass disbox123 \
          -dname "CN=Disbox, OU=Mobile, O=Disbox, L=Unknown, ST=Unknown, C=US"
        echo "KEYSTORE_PATH=$(pwd)/disbox-release.keystore" >> $GITHUB_ENV
        echo "KEYSTORE_PASSWORD=disbox123" >> $GITHUB_ENV
        echo "KEY_ALIAS=disbox" >> $GITHUB_ENV
        echo "KEY_PASSWORD=disbox123" >> $GITHUB_ENV

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build APK with Gradle
      run: |
        cd android && ./gradlew assembleRelease

    - name: Build AAB with Gradle (Only for tagged releases)
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        cd android && ./gradlew bundleRelease

    - name: Rename APK
      run: |
        cd android/app/build/outputs/apk/release
        # rename unsigned or signed apk to a friendly name
        for f in *.apk; do
          mv "$f" "disbox-${f}"
        done
        ls -la

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: android/app/build/outputs/apk/release/*.apk

    - name: Cleanup Previous Latest Release (only on main/master)
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      run: |
        gh release delete latest --yes || true
        git push origin :refs/tags/latest || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Latest Release (only on main/master)
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "Disbox Mobile - Latest"
        files: android/app/build/outputs/apk/release/*.apk
        generate_release_notes: true
        prerelease: false
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Tagged Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          android/app/build/outputs/apk/release/*.apk
          android/app/build/outputs/bundle/release/*.aab
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
